<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="/icons/concerts-favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/concerts-icon-32.png">
<link rel="apple-touch-icon" href="/icons/concerts-apple-touch-icon.png">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noindex, nofollow">
<title>Concert Log</title>
<script src="/auth.js?v=2"></script>
<script src="/db.js"></script>
<link rel="stylesheet" href="/holidays/holiday-style.css">
<style>
  /* ── TWO COLUMN LAYOUT (trips-style) ── */
  .page-layout { display: grid; grid-template-columns: 1fr 320px; gap: 0; align-items: start; }
  .main-col { min-width: 0; }
  .dash-col {
    border-left: 0.5px solid rgba(0,0,0,0.1); background: #ffffff;
    position: sticky; top: 44px; height: calc(100vh - 44px);
    overflow-y: auto; align-self: start; scrollbar-width: none;
  }
  .dash-col::-webkit-scrollbar { display: none; }

  .large-title-area { padding: 8px 20px 4px; }

  .section { padding: 0 20px 24px; }
  .section-title { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; color: #444444; margin-bottom: 10px; }
  .section-title .year { color: #0e7a87; }
  .year-divider { height: 1px; background: rgba(0,0,0,0.08); margin: 4px 20px 20px; }

  /* ── CONCERT CARDS GRID ── */
  .concerts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
  .c-card {
    background: #ffffff; border-radius: 18px; overflow: hidden;
    text-decoration: none; color: inherit; display: block;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08), 0 0 0 0.5px rgba(0,0,0,0.05);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }
  .c-card:hover { transform: scale(1.015); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
  .c-card:active { transform: scale(0.985); }
  .c-card-img { width: 100%; height: 140px; object-fit: cover; display: block; background: #f0f0f0; }
  .c-card-img.placeholder { display: flex; align-items: center; justify-content: center; color: #d5d5d5; }
  .c-card-body { padding: 12px 14px 14px; }
  .c-card-name { font-size: 15px; font-weight: 700; color: #444444; line-height: 1.25; }
  .c-card-meta { font-size: 11px; color: #555555; font-weight: 500; margin-top: 3px; }
  .c-badge {
    display: inline-block; background: rgba(14,122,135,0.1); color: #0e7a87;
    font-size: 8px; font-weight: 700; padding: 2px 7px; border-radius: 20px;
    letter-spacing: 0.05em; text-transform: uppercase; vertical-align: 2px; margin-left: 6px;
  }
  .c-stars { display: flex; gap: 2px; margin-top: 7px; }
  .c-stars svg { color: #d5d5d5; }
  .c-stars svg.on { color: #0e7a87; }

  .empty-state {
    background: #fff; border: 2px dashed #ccc; border-radius: 16px;
    padding: 40px 24px; text-align: center; color: #999;
    font-size: 12px; font-weight: 600; margin: 0 20px;
  }

  /* ── DASHBOARD ── */
  .dash-inner { padding: 0 0 32px; }
  .dash-section { padding: 16px 16px 0; }
  .dash-section-title { font-size: 11px; font-weight: 700; color: #888888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .dash-divider { height: 1px; background: rgba(0,0,0,0.06); margin: 16px 16px 0; }

  /* Latest concert hero */
  .dash-hero {
    border-radius: 14px; margin: 8px 16px 0; position: relative; overflow: hidden;
    background: linear-gradient(135deg, #1a2a2a 0%, #0e3a3f 100%);
    display: block; text-decoration: none; min-height: 150px;
  }
  .dash-hero img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.55; }
  .dash-hero-body { position: relative; padding: 14px 16px; display: flex; flex-direction: column; justify-content: flex-end; min-height: 150px; background: linear-gradient(to top, rgba(10,20,22,0.75) 0%, rgba(10,20,22,0.1) 60%); }
  .dash-hero-label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.65); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .dash-hero-name { font-size: 16px; font-weight: 700; color: #fff; line-height: 1.2; }
  .dash-hero-meta { font-size: 11px; color: rgba(255,255,255,0.75); font-weight: 500; margin-top: 3px; }

  /* Icon stat rows */
  .dash-stat { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: #e8e8e8; border-radius: 12px; margin-bottom: 8px; }
  .dash-stat:last-child { margin-bottom: 0; }
  .dash-stat-icon {
    flex-shrink: 0; color: #0e7a87;
    display: flex; align-items: center; justify-content: center;
  }
  .dash-stat-lbl { flex: 1; font-size: 10px; font-weight: 600; color: #888888; text-transform: uppercase; letter-spacing: 0.04em; }
  .dash-stat-val { font-size: 18px; font-weight: 700; color: #0e7a87; }

  /* Top artists */
  .top-artist { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 0.5px solid rgba(0,0,0,0.06); }
  .top-artist:last-child { border-bottom: none; }
  .top-artist-rank { font-size: 10px; font-weight: 700; color: #0e7a87; min-width: 18px; opacity: 0.7; }
  .top-artist-name { flex: 1; font-size: 12.5px; font-weight: 600; color: #444; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .top-artist-count { font-size: 11px; font-weight: 700; color: #888; }

  /* ── MOBILE ── */
  @media (max-width: 700px) {
    .page-layout { display: flex; flex-direction: column; }
    .main-col { width: 100%; }
    .dash-col { position: static; height: auto; border-left: none; border-top: 0.5px solid rgba(0,0,0,0.1); width: 100%; }
    .concerts-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
    .c-card-img { height: 110px; }
  }
  @media (max-width: 430px) {
    .concerts-grid { grid-template-columns: 1fr; }
    .c-card-img { height: 140px; }
  }
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-back" href="/">
    <svg width="10" height="17" viewBox="0 0 10 17" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 1 1 8.5 9 16"/></svg>
    Home
  </a>
  <div class="nav-title">Concert Log</div>
  <div class="nav-actions">
    <a class="nav-btn" href="/concerts/log.html?add=1" style="text-decoration:none;">+ Concert</a>
  </div>
</nav>

<div class="page-layout">

  <!-- ── MAIN COLUMN ── -->
  <div class="main-col">
    <div class="large-title-area">
      <div class="large-title">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#0e7a87" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
        Concert Log
      </div>
      <div class="large-subtitle" id="page-sub">Every gig, in one place</div>
    </div>
    <div id="year-sections" style="padding-top:12px;"></div>
  </div>

  <!-- ── DASHBOARD ── -->
  <div class="dash-col">
    <div class="dash-inner">

      <a class="dash-hero" id="dash-hero" style="display:none;">
        <img id="hero-img" alt="" style="display:none;">
        <div class="dash-hero-body">
          <div class="dash-hero-label">Latest concert</div>
          <div class="dash-hero-name" id="hero-name"></div>
          <div class="dash-hero-meta" id="hero-meta"></div>
        </div>
      </a>

      <div class="dash-section">
        <div class="dash-section-title">Stats</div>
        <div class="dash-stat">
          <div class="dash-stat-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          </div>
          <div class="dash-stat-lbl">Concerts</div>
          <div class="dash-stat-val" id="s-concerts">0</div>
        </div>
        <div class="dash-stat">
          <div class="dash-stat-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 22v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 22v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </div>
          <div class="dash-stat-lbl">Day festivals</div>
          <div class="dash-stat-val" id="s-festivals">0</div>
        </div>
        <div class="dash-stat">
          <div class="dash-stat-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </div>
          <div class="dash-stat-lbl">Artists seen</div>
          <div class="dash-stat-val" id="s-artists">0</div>
        </div>
        <div class="dash-stat">
          <div class="dash-stat-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          </div>
          <div class="dash-stat-lbl">Venues</div>
          <div class="dash-stat-val" id="s-venues">0</div>
        </div>
        <div class="dash-stat">
          <div class="dash-stat-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          </div>
          <div class="dash-stat-lbl">Total</div>
          <div class="dash-stat-val" id="s-total">0</div>
        </div>
      </div>

      <div class="dash-divider"></div>

      <div class="dash-section">
        <div class="dash-section-title">Most seen artists</div>
        <div id="top-artists"></div>
      </div>

    </div>
  </div>

</div>

<script>
const STAR = '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';

function parseDMY(s) {
  const m = (s || '').match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  return m ? new Date(+m[3], +m[2] - 1, +m[1]) : null;
}
function yearOf(c) {
  const m = (c.date || '').match(/(\d{4})/);
  return m ? +m[1] : null;
}
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}
function starsRow(rating) {
  let html = '<div class="c-stars">';
  for (let i = 1; i <= 5; i++) html += STAR.replace('<svg', '<svg class="' + (i <= rating ? 'on' : '') + '"');
  return html + '</div>';
}

function concertCard(c) {
  const isFest = c.type === 'festival';
  const a = document.createElement('a');
  a.className = 'c-card';
  a.href = '/concerts/log.html?year=' + yearOf(c);
  let html = '';
  if (c.thumb) html += '<img class="c-card-img" src="' + c.thumb + '" alt="">';
  else html += '<div class="c-card-img placeholder"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>';
  html += '<div class="c-card-body">';
  html += '<div class="c-card-name">' + esc(isFest ? c.name : c.artist) + (isFest ? '<span class="c-badge">Day Festival</span>' : '') + '</div>';
  const d = parseDMY(c.date);
  const dateStr = d ? d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) : (c.date || '');
  html += '<div class="c-card-meta">' + esc(isFest ? c.location : c.venue) + ' · ' + dateStr + '</div>';
  if (c.rating) html += starsRow(c.rating);
  html += '</div>';
  a.innerHTML = html;
  return a;
}

async function init() {
  let list = [];
  try {
    const rec = await dbLoad('concerts');
    if (rec && Array.isArray(rec.list)) list = rec.list;
  } catch (e) {}

  // ── Year sections ──
  const sections = document.getElementById('year-sections');
  const byYear = {};
  list.forEach(c => {
    const y = yearOf(c);
    if (y) (byYear[y] = byYear[y] || []).push(c);
  });
  const years = Object.keys(byYear).map(Number).sort((a, b) => b - a);

  if (!years.length) {
    sections.innerHTML = '<div class="empty-state">No concerts logged yet — tap + Concert to add your first</div>';
  }

  years.forEach((y, i) => {
    if (i > 0) {
      const div = document.createElement('div');
      div.className = 'year-divider';
      sections.appendChild(div);
    }
    const sec = document.createElement('div');
    sec.className = 'section';
    const title = document.createElement('div');
    title.className = 'section-title';
    title.innerHTML = '<span class="year">' + y + '</span> Concerts';
    sec.appendChild(title);
    const grid = document.createElement('div');
    grid.className = 'concerts-grid';
    byYear[y]
      .sort((a, b) => (parseDMY(b.date) || 0) - (parseDMY(a.date) || 0))
      .forEach(c => grid.appendChild(concertCard(c)));
    sec.appendChild(grid);
    sections.appendChild(sec);
  });

  document.getElementById('page-sub').textContent =
    list.length ? list.length + ' entries across ' + years.length + ' years' : 'Every gig, in one place';

  // ── Stats ──
  document.getElementById('s-concerts').textContent  = list.filter(c => c.type !== 'festival').length;
  document.getElementById('s-festivals').textContent = list.filter(c => c.type === 'festival').length;
  document.getElementById('s-total').textContent = list.length;

  const artistCounts = new Map(); // lower -> {name, count}
  const bump = a => {
    const k = (a || '').trim();
    if (!k) return;
    const lower = k.toLowerCase();
    const cur = artistCounts.get(lower) || { name: k, count: 0 };
    cur.count++;
    artistCounts.set(lower, cur);
  };
  list.forEach(c => {
    if (c.type === 'festival') (c.artistsSeen || []).forEach(bump);
    else {
      (c.artist || '').split(',').forEach(bump);
      (c.support || '').split(',').forEach(bump);
      (c.guests || '').split(',').forEach(bump);
    }
  });
  document.getElementById('s-artists').textContent = artistCounts.size;
  document.getElementById('s-venues').textContent =
    new Set(list.map(c => ((c.venue || c.location || '')).trim().toLowerCase()).filter(Boolean)).size;

  // ── Top artists ──
  const top = [...artistCounts.values()].sort((a, b) => b.count - a.count).slice(0, 5);
  const topWrap = document.getElementById('top-artists');
  if (!top.length) topWrap.innerHTML = '<div style="font-size:11px;color:#b8b8b8;font-weight:500;">Log some concerts first</div>';
  top.forEach((t, i) => {
    const row = document.createElement('div');
    row.className = 'top-artist';
    row.innerHTML = '<div class="top-artist-rank">' + (i + 1) + '</div>'
      + '<div class="top-artist-name">' + esc(t.name) + '</div>'
      + '<div class="top-artist-count">' + t.count + '×</div>';
    topWrap.appendChild(row);
  });

  // ── Latest concert hero ──
  const dated = list.filter(c => parseDMY(c.date)).sort((a, b) => parseDMY(b.date) - parseDMY(a.date));
  const latest = dated[0];
  if (latest) {
    const hero = document.getElementById('dash-hero');
    hero.style.display = 'block';
    hero.href = '/concerts/log.html?year=' + yearOf(latest);
    document.getElementById('hero-name').textContent = latest.artist || latest.name || '';
    document.getElementById('hero-meta').textContent =
      [latest.venue || latest.location, latest.date].filter(Boolean).join(' · ');
    if (latest.thumb) {
      const img = document.getElementById('hero-img');
      img.src = latest.thumb;
      img.style.display = 'block';
      if (latest.hasPhoto) {
        dbLoad('concert-photo-' + latest.id)
          .then(rec => { if (rec && rec.photo) img.src = rec.photo; })
          .catch(() => {});
      }
    }
  }
}

init();
</script>
</body>
</html>
