<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Private · Joel Pagett</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { visibility: hidden; }
  body { font-family: 'Montserrat', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; display: flex; flex-direction: column; }

  .hero { padding: 56px 24px 40px; text-align: center; }
  .hero-avatar { width: 64px; height: 64px; background: linear-gradient(135deg, #0e7a87, #0fbdcf); border-radius: 18px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 20px; box-shadow: 0 0 0 1px rgba(15,189,207,0.2), 0 8px 32px rgba(14,122,135,0.35); }
  .hero-title { font-size: 28px; font-weight: 800; color: #ffffff; letter-spacing: -0.02em; margin-bottom: 6px; }
  .hero-sub { font-size: 13px; color: #7d8590; font-weight: 500; }

  .content { padding: 8px 16px 40px; flex: 1; max-width: 600px; margin: 0 auto; width: 100%; }
  .empty-state { background: #161b22; border: 1px dashed #21262d; border-radius: 16px; padding: 48px 24px; text-align: center; color: #3d444d; }
  .empty-state svg { margin-bottom: 14px; }
  .empty-title { font-size: 14px; font-weight: 700; color: #7d8590; margin-bottom: 4px; }
  .empty-sub { font-size: 12px; font-weight: 500; }

  .hub-footer { text-align: center; padding: 0 24px 32px; font-size: 11px; color: #3d444d; font-weight: 500; }
  .back-link { position: fixed; top: 20px; left: 20px; color: #3d444d; transition: color 0.15s; display: flex; align-items: center; gap: 6px; text-decoration: none; font-size: 12px; font-weight: 600; }
  .back-link:hover { color: #0fbdcf; }
</style>
</head>
<body>

<a class="back-link" href="/">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  Home
</a>

<div class="hero">
  <div class="hero-avatar">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>
  <div class="hero-title">Private</div>
  <div class="hero-sub">Restricted area</div>
</div>

<div class="content">
  <div class="empty-state">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
    <div class="empty-title">Nothing here yet</div>
    <div class="empty-sub">Content coming soon</div>
  </div>
</div>

<div class="hub-footer">
  joelpagett.co.uk · Private
</div>

<script>
// ══════════════════════════════════════════════════════════════════════
//  PRIVATE SECTION — Password gate
//  Separate from the main site PIN. Session key: jp_private_auth (12h).
// ══════════════════════════════════════════════════════════════════════
(function () {
  const PW_HASH = '0c252e6d0e16d7f3c41e26b97ed1dc70f6333b2a66273129f842e61b1ff79610';
  const SESSION_KEY = 'jp_private_auth';
  const SESSION_TTL = 12 * 60 * 60 * 1000;

  function isAuthed() {
    try {
      const s = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');
      return s && s.ok && (Date.now() - s.ts) < SESSION_TTL;
    } catch { return false; }
  }

  function storeSession() {
    localStorage.setItem(SESSION_KEY, JSON.stringify({ ok: true, ts: Date.now() }));
  }

  async function hash(str) {
    if (window.crypto && crypto.subtle && window.isSecureContext) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }
    return jsSha256(str);
  }

  // Pure-JS SHA-256 fallback (same implementation pattern as auth.js) so it works on HTTP too
  function jsSha256(str) {
    function rightRotate(v, a) { return (v >>> a) | (v << (32 - a)); }
    var mathPow = Math.pow, maxWord = mathPow(2, 32), i, j, result = '', words = [];
    var asciiBitLength = str.length * 8;
    var hash = jsSha256.h = jsSha256.h || [], k = jsSha256.k = jsSha256.k || [];
    var primeCounter = k.length, isComposite = {};
    for (var candidate = 2; primeCounter < 64; candidate++) {
      if (!isComposite[candidate]) {
        for (i = 0; i < 313; i += candidate) isComposite[i] = candidate;
        hash[primeCounter] = (mathPow(candidate, .5) * maxWord) | 0;
        k[primeCounter++] = (mathPow(candidate, 1 / 3) * maxWord) | 0;
      }
    }
    str += '\x80';
    while (str.length % 64 - 56) str += '\x00';
    for (i = 0; i < str.length; i++) {
      j = str.charCodeAt(i);
      if (j >> 8) return '';
      words[i >> 2] |= j << ((3 - i) % 4) * 8;
    }
    words[words.length] = ((asciiBitLength / maxWord) | 0);
    words[words.length] = (asciiBitLength);
    for (j = 0; j < words.length;) {
      var w = words.slice(j, j += 16), oldHash = hash.slice(0);
      hash = hash.slice(0, 8);
      for (i = 0; i < 64; i++) {
        var w15 = w[i - 15], w2 = w[i - 2];
        var a = hash[0], e = hash[4];
        var temp1 = hash[7]
          + (rightRotate(e, 6) ^ rightRotate(e, 11) ^ rightRotate(e, 25))
          + ((e & hash[5]) ^ (~e & hash[6]))
          + k[i]
          + (w[i] = (i < 16) ? w[i] : (
            w[i - 16]
            + (rightRotate(w15, 7) ^ rightRotate(w15, 18) ^ (w15 >>> 3))
            + w[i - 7]
            + (rightRotate(w2, 17) ^ rightRotate(w2, 19) ^ (w2 >>> 10))
          ) | 0);
        var temp2 = (rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22))
          + ((a & hash[1]) ^ (a & hash[2]) ^ (hash[1] & hash[2]));
        hash = [(temp1 + temp2) | 0].concat(hash);
        hash[4] = (hash[4] + temp1) | 0;
      }
      for (i = 0; i < 8; i++) hash[i] = (hash[i] + oldHash[i]) | 0;
    }
    for (i = 0; i < 8; i++) {
      for (j = 3; j + 1; j--) {
        var b = (hash[i] >> (j * 8)) & 255;
        result += ((b < 16) ? 0 : '') + b.toString(16);
      }
    }
    return result;
  }

  function showGate() {
    document.documentElement.style.visibility = 'visible';
    const overlay = document.createElement('div');
    overlay.id = 'pw-overlay';
    overlay.innerHTML = `
    <style>
      #pw-overlay{position:fixed;inset:0;z-index:9999;background:#0d1117;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Montserrat',sans-serif;padding:24px;}
      #pw-logo{width:64px;height:64px;background:linear-gradient(135deg,#0e7a87,#0fbdcf);border-radius:18px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 0 0 1px rgba(15,189,207,0.2),0 8px 32px rgba(14,122,135,0.35);}
      #pw-title{font-size:22px;font-weight:800;color:#fff;letter-spacing:-0.02em;margin-bottom:6px;}
      #pw-sub{font-size:13px;color:#7d8590;font-weight:500;margin-bottom:32px;}
      #pw-form{display:flex;gap:8px;width:100%;max-width:340px;}
      #pw-input{flex:1;background:#161b22;border:1px solid #21262d;border-radius:12px;padding:13px 16px;font-family:'Montserrat',sans-serif;font-size:14px;color:#e6edf3;outline:none;transition:border-color 0.15s;}
      #pw-input:focus{border-color:#0e7a87;}
      #pw-input::placeholder{color:#3d444d;}
      #pw-input.error{border-color:#f85149;animation:pwshake 0.3s;}
      @keyframes pwshake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
      #pw-go{background:linear-gradient(135deg,#0a6570,#0e7a87);border:none;border-radius:12px;width:48px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;transition:opacity 0.15s;}
      #pw-go:hover{opacity:0.85;}
      #pw-error{margin-top:16px;font-size:12px;font-weight:600;color:#f85149;opacity:0;transition:opacity 0.2s;height:16px;}
      #pw-error.show{opacity:1;}
      #pw-home{margin-top:28px;font-size:12px;font-weight:600;color:#3d444d;text-decoration:none;transition:color 0.15s;}
      #pw-home:hover{color:#0fbdcf;}
    </style>
    <div id="pw-logo">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <div id="pw-title">Private</div>
    <div id="pw-sub">Enter password to continue</div>
    <div id="pw-form">
      <input id="pw-input" type="password" placeholder="Password" autocomplete="current-password" autofocus>
      <button id="pw-go" title="Unlock">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div id="pw-error">Incorrect password — try again</div>
    <a id="pw-home" href="/">&larr; Back to home</a>`;

    document.body.appendChild(overlay);
    const input = overlay.querySelector('#pw-input');
    const errEl = overlay.querySelector('#pw-error');
    setTimeout(() => input.focus(), 50);

    async function attempt() {
      const val = input.value;
      if (!val) return;
      const h = await hash(val);
      if (h === PW_HASH) {
        storeSession();
        overlay.remove();
        document.documentElement.style.visibility = 'visible';
      } else {
        input.classList.add('error');
        errEl.classList.add('show');
        setTimeout(() => { input.classList.remove('error'); errEl.classList.remove('show'); input.value = ''; input.focus(); }, 900);
      }
    }

    overlay.querySelector('#pw-go').addEventListener('click', attempt);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') attempt(); });
  }

  if (isAuthed()) {
    document.documentElement.style.visibility = 'visible';
  } else {
    document.addEventListener('DOMContentLoaded', showGate);
  }
})();
</script>
</body>
</html>
