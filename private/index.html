<style>

  .rating-stars { display: inline-flex; gap: 2px; }

  .f-textarea { width: 100%; border: 1px solid #30363d; border-radius: 9px; padding: 9px 11px; font-family: Montserrat, sans-serif; font-size: 13px; color: #e6edf3; outline: none; background: #0d1117; resize: vertical; min-height: 70px; line-height: 1.5; }

  .f-textarea::placeholder { color: #3d444d; }
  .subhead { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #0fbdcf; margin: 18px 0 10px; }
  .acts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .act-toggle {
    display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none;

  .act-toggle:hover { border-color: #30363d; }

    -webkit-appearance: none; appearance: none; width: 20px; height: 20px;
    border-radius: 50%; background: #0e7a87; border: 2px solid #0fbdcf; cursor: pointer;
  }
  input[type=range].slider::-moz-range-thumb {

  .d-btn { font-family: Montserrat, sans-serif; font-size: 12.5px; font-weight: 700; border-radius: 10px; padding: 9px 18px; cursor: pointer; border: none; display: flex; align-items: center; gap: 7px; transition: all 0.15s; }
  .d-btn.edit { background: #0e7a87; color: #fff; }
  .d-btn.edit:hover { background: #0fbdcf; }
  .d-btn.delete { background: none; color: #3d444d; margin-left: auto; padding: 9px 10px; }
  .d-btn.delete:hover { color: #f85149; background: rgba(248,81,73,0.1); }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: none; align-items: flex-start; justify-content: center; padding: 24px 16px; overflow-y: auto; }
  .modal-overlay.open { display: flex; }
  .modal { background: #161b22; border: 1px solid #21262d; border-radius: 18px; padding: 22px; width: 100%; max-width: 440px; }
  .modal-title { font-size: 17px; font-weight: 700; color: #e6edf3; margin-bottom: 16px; letter-spacing: -0.3px; }
  .f-group { margin-bottom: 13px; }
  .f-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #7d8590; margin-bottom: 5px; display: block; }
  .f-input { width: 100%; border: 1px solid #30363d; border-radius: 9px; padding: 9px 11px; font-family: Montserrat, sans-serif; font-size: 13px; color: #e6edf3; outline: none; background: #0d1117; transition: border-color 0.15s; }
  .f-input:focus { border-color: #0e7a87; }
  .f-input::placeholder { color: #3d444d; }
  .f-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .f-textarea { width: 100%; border: 1px solid #30363d; border-radius: 9px; padding: 9px 11px; font-family: Montserrat, sans-serif; font-size: 13px; color: #e6edf3; outline: none; background: #0d1117; resize: vertical; min-height: 70px; line-height: 1.6; transition: border-color 0.15s; }
  .f-textarea:focus { border-color: #0e7a87; }
  .f-textarea::placeholder { color: #3d444d; }
  .detail-profile { margin-top: 12px; padding: 11px 13px; background: #0d1117; border: 1px solid #21262d; border-radius: 10px; font-size: 12.5px; color: #adbac7; font-weight: 500; line-height: 1.6; white-space: pre-wrap; }
  .detail-profile-title { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #7d8590; margin-bottom: 5px; }
  .photo-drop { border: 2px dashed #30363d; border-radius: 12px; padding: 18px; text-align: center; cursor: pointer; color: #7d8590; font-size: 11px; font-weight: 600; transition: all 0.15s; position: relative; overflow: hidden; }
  .photo-drop:hover { border-color: #0e7a87; color: #0fbdcf; }
  .photo-drop img { width: 100%; border-radius: 8px; display: block; }
  .photo-drop .pd-remove { position: absolute; top: 8px; right: 8px; width: 26px; height: 26px; background: rgba(0,0,0,0.6); color: #fff; border: none; border-radius: 7px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
  .m-btn { font-family: Montserrat, sans-serif; font-size: 13px; font-weight: 700; border-radius: 9px; padding: 9px 20px; cursor: pointer; border: none; transition: all 0.15s; }
  .m-btn.cancel { background: #21262d; color: #7d8590; }
  .m-btn.cancel:hover { background: #30363d; }
  .m-btn.save { background: #0e7a87; color: #fff; }
  .m-btn.save:hover { background: #0fbdcf; }

</style>

<a class="back-link" href="/">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>

<div class="hero">

<!-- ── ADD / EDIT MODAL ── -->

  <div class="modal">
    <div class="modal-title" id="modal-title">Add entry</div>

      <div class="slider-head"><label class="f-label" style="margin:0;">Dick Rating</label><span class="slider-val" id="dickrating-val">Not set</span></div>

<script>
let entries = [];
let editingId = null;
let modalPhoto = null;
let modalPhotoRemoved = false;
// Dick size slider: index 0 = not set, 1..8 → 5, 5.5, 6, ... 9 inches
const SIZE_STEPS = ['5', '5.5', '6', '6.5', '7', '7.5', '8', '9'];
function sizeLabel(idx) { return (idx >= 1 && idx <= SIZE_STEPS.length) ? SIZE_STEPS[idx - 1] + ' inches' : ''; }
function updateDickSize() {
  const v = +document.getElementById('f-dicksize').value;
  document.getElementById('dicksize-val').textContent = v === 0 ? 'Not set' : sizeLabel(v);
}
function updateRating(which) {
  const v = +document.getElementById('f-' + which + 'rating').value;
  document.getElementById(which + 'rating-val').textContent = v === 0 ? 'Not set' : v + ' / 10';
}

// Acts — original simple line icons (generic symbols, not from any external set)
const ACTS = [
  { key: 'wanking',  label: 'Wanking',  icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 11V8a2 2 0 0 1 2-2h1"/><path d="M10 6V4a1.5 1.5 0 0 1 3 0v6"/><path d="M13 7a1.5 1.5 0 0 1 3 0v4"/><path d="M16 8.5a1.5 1.5 0 0 1 3 0V14a6 6 0 0 1-6 6h-1a6 6 0 0 1-5.2-3L4 12.5a1.6 1.6 0 0 1 2.7-1.7L8 12"/></svg>' },

function parseDMY(str) {

  m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);       // legacy dd/mm/yyyy
  if (m) return new Date(+m[3], +m[2] - 1, 1);
  return null;
}

// ── IMAGE COMPRESSION ──
function drawScaled(source, w, h, maxW, quality) {
  const scale = Math.min(1, maxW / w);
  const canvas = document.createElement('canvas');
  canvas.width = Math.round(w * scale);
  canvas.height = Math.round(h * scale);
  canvas.getContext('2d').drawImage(source, 0, 0, canvas.width, canvas.height);
  return canvas.toDataURL('image/jpeg', quality);
}
async function compress(file, maxW, quality) {
  if (window.createImageBitmap) {
    try {
      const bmp = await createImageBitmap(file);
      const out = drawScaled(bmp, bmp.width, bmp.height, maxW, quality);
      bmp.close();
      return out;
    } catch (e) {}
  }
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      try { resolve(drawScaled(img, img.width, img.height, maxW, quality)); }
      catch (e) { reject(e); }
      URL.revokeObjectURL(img.src);
    };
    img.onerror = () => { URL.revokeObjectURL(img.src); reject(new Error('unsupported image format')); };
    img.src = URL.createObjectURL(file);
  });
}

async function loadFresh() {
  try {

  } catch (e) { entries = []; }
}

async function saveEntry() {
  const name  = document.getElementById('f-name').value.trim();
  const start = document.getElementById('f-start').value.trim();
  const end   = document.getElementById('f-end').value.trim();
  if (!name || !start) { alert('Name and start date are required'); return; }
  if (!parseDMY(start)) { alert('Start date must be mm/yyyy'); return; }
  if (end && !parseDMY(end)) { alert('Finish date must be mm/yyyy'); return; }

  const btn = document.getElementById('save-btn');
  btn.disabled = true;

  await loadFresh(); // always load fresh before saving

  const id = editingId || ('p' + Date.now());
  const existing = entries.find(x => x.id === id);
  const numRaw = document.getElementById('f-number').value.trim();

  const entry = {
    id,
    name,
    start,
    end,
    number: numRaw === '' ? '' : Number(numRaw),
    dicksize:   +document.getElementById('f-dicksize').value,
    dickRating: +document.getElementById('f-dickrating').value,
    assRating:  +document.getElementById('f-assrating').value,
    face:       document.getElementById('f-face').value.trim(),
    details:    document.getElementById('f-details').value.trim(),
    acts:       Object.assign({}, actState),
    thumb:    existing ? existing.thumb : null,
    hasPhoto: existing ? !!existing.hasPhoto : false,
  };

  if (modalPhoto) {
    entry.thumb = modalPhoto.thumb;
    entry.hasPhoto = true;
  } else if (modalPhotoRemoved) {
    entry.thumb = null;
    entry.hasPhoto = false;
  }

  const idx = entries.findIndex(x => x.id === id);
  if (idx >= 0) entries[idx] = entry; else entries.push(entry);

  try {
    if (modalPhoto) await dbSave('private-photo-' + id, { photo: modalPhoto.full });
    else if (modalPhotoRemoved) { try { await dbDelete('private-photo-' + id); } catch (e) {} }
    await dbSave('private-log', { list: entries });
  } catch (e) {
    alert('Save failed: ' + e.message);
    btn.disabled = false;
    return;
  }

  btn.disabled = false;
  closeModal();
  renderAll();
}

function deleteFromModal() {
  if (editingId) { const id = editingId; closeModal(); deleteEntry(id); }
}

async function deleteEntry(id) {
  const c = entries.find(x => x.id === id);
  if (!confirm('Delete ' + (c ? c.name : 'this entry') + '?')) return;
  closeDetail();
  await loadFresh();
  entries = entries.filter(x => x.id !== id);
  try {
    await dbSave('private-log', { list: entries });
    try { await dbDelete('private-photo-' + id); } catch (e) {}
  } catch (e) { alert('Delete failed: ' + e.message); return; }
  renderAll();
}

// ── INIT ──
(async () => {
  await loadFresh();
  renderAll();
})();

    </style>
    <div id="pw-logo">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <div id="pw-title">Private</div>
    <div id="pw-sub">Enter password to continue</div>
    <div id="pw-form">
      <input id="pw-input" type="password" placeholder="Password" autocomplete="current-password" autofocus>
      <button id="pw-go" title="Unlock">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div id="pw-error">Incorrect password — try again</div>
    <a id="pw-home" href="/">&larr; Back to home</a>`;

    document.body.appendChild(overlay);
    const input = overlay.querySelector('#pw-input');
    const errEl = overlay.querySelector('#pw-error');
    setTimeout(() => input.focus(), 50);

    async function attempt() {
      const val = input.value;
      if (!val) return;
      const h = await hash(val);
      if (h === PW_HASH) {
        storeSession();
        overlay.remove();
        document.documentElement.style.visibility = 'visible';
      } else {
        input.classList.add('error');
        errEl.classList.add('show');
        setTimeout(() => { input.classList.remove('error'); errEl.classList.remove('show'); input.value = ''; input.focus(); }, 900);
      }
    }

    overlay.querySelector('#pw-go').addEventListener('click', attempt);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') attempt(); });
  }

  if (isAuthed()) {
    document.documentElement.style.visibility = 'visible';
  } else {
    document.addEventListener('DOMContentLoaded', showGate);
  }
})();
</script>
</body>
</html>
