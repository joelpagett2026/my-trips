<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="/icons/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noindex, nofollow">
<title>Parks Around the World</title>
<script src="/auth.js?v=3"></script>
<script src="/db.js?v=3"></script>
<link rel="stylesheet" href="/holidays/holiday-style.css">
<style>
  html, body { height: 100%; }
  .nav {
    background: rgba(47,47,50,0.97);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .nav .nav-title, .nav .nav-back { color: #ffffff; }
  .nav .nav-back:hover { opacity: 0.85; }

  .map-shell { position: relative; height: calc(100vh - 52px); }
  #map { width: 100%; height: 100%; background: #e8e8e8; }

  .legend {
    position: absolute; top: 14px; left: 14px; z-index: 5;
    background: rgba(255,255,255,0.96); border-radius: 14px;
    padding: 12px 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.16);
    display: flex; gap: 18px; align-items: center;
  }
  .lg-item { text-align: center; }
  .lg-val { font-size: 19px; font-weight: 700; color: #0e7a87; line-height: 1; }
  .lg-lbl { font-size: 8.5px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; }
  .lg-div { width: 1px; height: 28px; background: rgba(0,0,0,0.1); }

  .loading {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #999; letter-spacing: 0.05em; text-transform: uppercase;
    background: #e8e8e8; z-index: 6;
  }
  .loading.hidden { display: none; }

  .iw { font-family: Montserrat, sans-serif; padding: 2px 4px 4px; min-width: 150px; }
  .iw-name { font-size: 14px; font-weight: 700; color: #444; letter-spacing: -0.2px; }
  .iw-place { font-size: 11px; color: #888; font-weight: 500; margin-top: 2px; }
  .iw-row { margin-top: 7px; display: flex; gap: 5px; flex-wrap: wrap; }
  .iw-pill {
    font-size: 8.5px; font-weight: 700; padding: 2px 8px; border-radius: 20px;
    letter-spacing: 0.05em; text-transform: uppercase;
    background: rgba(14,122,135,0.15); color: #0e7a87;
  }
  .iw-pill.grey { background: rgba(100,100,110,0.15); color: #666; }

  /* ── DETAIL LIGHTBOX (matches the tracker page) ── */
  .detail-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 180;
    display: none; align-items: flex-start; justify-content: center;
    padding: 32px 16px; overflow-y: auto;
  }
  .detail-overlay.open { display: flex; }
  .detail-card {
    background: #fff; border-radius: 20px; overflow: hidden;
    width: 100%; max-width: 620px; box-shadow: 0 24px 80px rgba(0,0,0,0.35);
    position: relative;
  }
  .detail-photo { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; display: block; background: #f0f0f0; }
  .detail-close {
    position: absolute; top: 12px; right: 12px; z-index: 10;
    width: 32px; height: 32px; border: none; border-radius: 10px; cursor: pointer;
    background: rgba(0,0,0,0.45); color: #fff;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  }
  .detail-close:hover { background: rgba(0,0,0,0.65); }
  .detail-close.no-photo { background: #f0f0f0; color: #888; }
  .detail-body { padding: 18px 22px 20px; }
  .detail-name { font-size: 20px; font-weight: 700; letter-spacing: -0.4px; color: #444; padding-right: 24px; }
  .detail-meta { font-size: 12px; color: #888; font-weight: 500; margin-top: 8px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .detail-meta svg { flex-shrink: 0; color: #b8b8b8; }
  .detail-stars { display: flex; gap: 3px; margin-top: 11px; }
  .detail-stars svg { color: #d5d5d5; }
  .detail-stars svg.on { color: #0e7a87; }
  .detail-coasters { margin-top: 14px; padding: 12px 14px; background: #f7f7f7; border-radius: 12px; }
  .detail-coasters-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #999; margin-bottom: 6px; }
  .detail-coasters ul { margin: 0; padding: 0; list-style: none; }
  .detail-coasters li {
    font-size: 12.5px; color: #555; font-weight: 500; padding: 5px 0;
    border-bottom: 0.5px solid rgba(0,0,0,0.06);
    display: flex; align-items: center; gap: 6px;
  }
  .detail-coasters li:last-child { border-bottom: none; }
  .detail-coasters li.is-defunct { color: #999; }
  .cl-name { flex: 1; }
  .cl-rate {
    flex-shrink: 0; min-width: 26px; text-align: center;
    font-size: 11px; font-weight: 700; padding: 2px 6px; border-radius: 6px;
    background: rgba(14,122,135,0.12); color: #0e7a87;
  }
  .cl-rate.top { background: #0e7a87; color: #fff; }
  .defunct-tag {
    display: inline-block; margin-left: 6px; vertical-align: 1px;
    font-size: 7.5px; font-weight: 700; padding: 1px 6px; border-radius: 20px;
    letter-spacing: 0.05em; text-transform: uppercase;
    background: rgba(229,62,62,0.12); color: #e53e3e; border: 1px solid rgba(229,62,62,0.22);
  }
  .detail-pill-row { margin-top: 7px; display: flex; gap: 6px; flex-wrap: wrap; }
  .p-tag {
    display: inline-block;
    font-size: 9px; font-weight: 700; padding: 2px 9px; border-radius: 20px;
    letter-spacing: 0.05em; text-transform: uppercase;
    background: rgba(14,122,135,0.18); color: #0e7a87; border: 1px solid rgba(14,122,135,0.25);
  }
  .p-tag.muted { background: rgba(100,100,110,0.18); color: #666666; border: 1px solid rgba(100,100,110,0.2); }

  @media (max-width: 700px) {
    .legend { top: 10px; left: 10px; right: 10px; padding: 10px 12px; gap: 10px; justify-content: space-around; }
    .detail-overlay { padding: 16px 12px; }
  }
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-back" href="/parks/">
    <svg width="10" height="17" viewBox="0 0 10 17" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 1 1 8.5 9 16"/></svg>
    Tracker
  </a>
  <div class="nav-title">Parks Around the World</div>
  <div class="nav-actions"></div>
</nav>

<div class="map-shell">
  <div class="legend">
    <div class="lg-item"><div class="lg-val" id="lg-parks">—</div><div class="lg-lbl">Parks</div></div>
    <div class="lg-div"></div>
    <div class="lg-item"><div class="lg-val" id="lg-countries">—</div><div class="lg-lbl">Countries</div></div>
    <div class="lg-div"></div>
    <div class="lg-item"><div class="lg-val" id="lg-credits">—</div><div class="lg-lbl">Credits</div></div>
  </div>
  <div class="loading" id="loading">Loading map…</div>
  <div id="map"></div>
</div>

<div class="detail-overlay" id="detail-overlay">
  <div class="detail-card" id="detail-card"></div>
</div>

<script>
const STAR = '<svg width="__S__" height="__S__" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
let visits = [], coords = {};

function normCoaster(c) {
  if (typeof c === 'string') {
    return { name: c.replace(/\s*\*\s*$/, '').trim(), rating: 0, defunct: /\*\s*$/.test(c) };
  }
  c = c || {};
  const r = parseInt(c.rating, 10);
  return { name: (c.name || '').trim(), rating: (r >= 1 && r <= 10) ? r : 0, defunct: !!c.defunct };
}
function coastersOf(v) { return (v.coasters || []).map(normCoaster).filter(c => c.name); }
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function parseParts(s) {
  s = (s || '').trim();
  let m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return { d: new Date(+m[3], +m[2] - 1, +m[1]), prec: 'day' };
  m = s.match(/^(\d{1,2})\/(\d{4})$/);
  if (m) return { d: new Date(+m[2], +m[1] - 1, 1), prec: 'month' };
  m = s.match(/^(\d{4})$/);
  if (m) return { d: new Date(+m[1], 0, 1), prec: 'year' };
  return null;
}
function fmtDate(s) {
  const p = parseParts(s);
  if (!p) return s || '';
  if (p.prec === 'year')  return String(p.d.getFullYear());
  if (p.prec === 'month') return p.d.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
  return p.d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
}
function starsRow(rating, size, cls) {
  let html = '<div class="' + cls + '">';
  for (let i = 1; i <= 5; i++) html += STAR.replace(/__S__/g, size).replace('<svg', '<svg class="' + (i <= rating ? 'on' : '') + '"');
  return html + '</div>';
}

// One pin can cover several visits to the same park — show them pooled
function openParkDetail(parkKey) {
  const mine = visits.filter(v => (v.park || '').trim().toLowerCase() === parkKey)
    .sort((a, b) => (parseParts(b.date) ? parseParts(b.date).d : 0) - (parseParts(a.date) ? parseParts(a.date).d : 0));
  if (!mine.length) return;

  const lead = mine.find(v => v.hasPhoto) || mine[0];
  const rated = mine.filter(v => v.rating);
  const rating = rated.length ? Math.round(rated.reduce((n, v) => n + v.rating, 0) / rated.length) : 0;

  // Pool coasters across visits, keeping the best rating for each
  const pooled = new Map();
  mine.forEach(v => coastersOf(v).forEach(c => {
    const k = c.name.toLowerCase();
    const cur = pooled.get(k);
    if (!cur || c.rating > cur.rating) pooled.set(k, c);
  }));
  const coasters = [...pooled.values()].sort((a, b) => (a.defunct ? 1 : 0) - (b.defunct ? 1 : 0));

  const years = [...new Set(mine.map(v => (v.date || '').match(/(\d{4})/)).filter(Boolean).map(m => +m[1]))].sort();
  const span = years.length ? (years[0] === years[years.length - 1] ? String(years[0]) : years[0] + '–' + years[years.length - 1]) : '';
  const place = [lead.location, lead.country].map(s => (s || '').trim()).filter(Boolean).join(', ');

  let html = '<button class="detail-close' + (lead.hasPhoto ? '' : ' no-photo') + '" onclick="closeDetail()">'
    + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';

  if (lead.hasPhoto) html += '<img class="detail-photo" id="detail-photo"' + (lead.thumb ? ' src="' + lead.thumb + '"' : '') + ' alt="">';

  html += '<div class="detail-body">';
  html += '<div class="detail-name">' + esc(lead.park) + '</div>';
  html += '<div class="detail-pill-row">'
    + (coasters.length ? '<span class="p-tag">' + coasters.length + ' coaster' + (coasters.length === 1 ? '' : 's') + '</span>'
                       : '<span class="p-tag muted">No coasters logged</span>')
    + (mine.length > 1 ? '<span class="p-tag muted">' + mine.length + ' visits</span>' : '')
    + '</div>';

  html += '<div class="detail-meta">'
    + '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>' + esc(place)
    + '<span style="color:#d5d5d5;">·</span>'
    + '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'
    + (mine.length > 1 ? esc(span) : esc(fmtDate(lead.date)))
    + '</div>';

  if (rating) html += starsRow(rating, 16, 'detail-stars');

  if (coasters.length) {
    html += '<div class="detail-coasters"><div class="detail-coasters-title">Coasters ridden · ' + coasters.length + '</div><ul>'
      + coasters.map(c =>
          '<li' + (c.defunct ? ' class="is-defunct"' : '') + '>'
          + '<span class="cl-name">' + esc(c.name) + '</span>'
          + (c.defunct ? '<span class="defunct-tag">Defunct</span>' : '')
          + (c.rating ? '<span class="cl-rate' + (c.rating === 10 ? ' top' : '') + '">' + c.rating + '</span>' : '')
          + '</li>').join('')
      + '</ul></div>';
  }

  html += '</div>';

  document.getElementById('detail-card').innerHTML = html;
  document.getElementById('detail-overlay').classList.add('open');

  if (lead.hasPhoto) {
    dbLoad('park-photo-' + lead.id).then(rec => {
      if (rec && rec.photo) {
        const img = document.getElementById('detail-photo');
        if (img) img.src = rec.photo;
      }
    }).catch(() => {});
  }
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
}
document.getElementById('detail-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeDetail();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

// Roll the visit list up into one entry per park
function parkIndex() {
  const m = new Map();
  visits.forEach(v => {
    const name = (v.park || '').trim();
    if (!name) return;
    const k = name.toLowerCase();
    const cur = m.get(k) || {
      name, location: v.location || '', country: v.country || '',
      visits: 0, credits: new Set(), years: [],
    };
    cur.visits++;
    coastersOf(v).forEach(c => cur.credits.add(c.name.toLowerCase()));
    const y = (v.date || '').match(/(\d{4})/);
    if (y) cur.years.push(+y[1]);
    if (!cur.location && v.location) cur.location = v.location;
    if (!cur.country && v.country) cur.country = v.country;
    m.set(k, cur);
  });
  return [...m.values()];
}

async function init() {
  const [p, c] = await Promise.all([
    dbLoad('parks').catch(() => null),
    dbLoad('park-coords').catch(() => null),
  ]);
  visits = (p && Array.isArray(p.list)) ? p.list : [];
  coords = (c && c.map) ? c.map : {};

  const parks = parkIndex();
  const placed = parks.filter(p => coords[p.name]);

  document.getElementById('lg-parks').textContent = parks.length;
  document.getElementById('lg-countries').textContent =
    new Set(parks.map(p => (p.country || '').trim().toLowerCase()).filter(Boolean)).size;
  document.getElementById('lg-credits').textContent =
    parks.reduce((n, p) => n + p.credits.size, 0);

  const map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 30, lng: 10 },
    zoom: 2,
    minZoom: 2,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: false,
    styles: [
      { featureType: 'poi', stylers: [{ visibility: 'off' }] },
      { featureType: 'transit', stylers: [{ visibility: 'off' }] },
      { featureType: 'road', elementType: 'labels', stylers: [{ visibility: 'off' }] },
      { featureType: 'water', stylers: [{ color: '#cfe3e6' }] },
      { featureType: 'landscape', stylers: [{ color: '#f2f2f0' }] },
    ],
  });

  const bounds = new google.maps.LatLngBounds();

  placed.forEach(p => {
    const pos = coords[p.name];
    bounds.extend(pos);
    const marker = new google.maps.Marker({
      position: pos,
      map,
      title: p.name,
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 7,
        fillColor: '#0e7a87',
        fillOpacity: 0.9,
        strokeColor: '#ffffff',
        strokeWeight: 2,
      },
    });

    marker.addListener('click', () => openParkDetail(p.name.toLowerCase()));
  });

  if (placed.length) {
    map.fitBounds(bounds, 60);
    google.maps.event.addListenerOnce(map, 'idle', () => {
      if (map.getZoom() > 6) map.setZoom(6);
    });
  }

  document.getElementById('loading').classList.add('hidden');
}

window.gmReady = init;
</script>
<script async
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCHugrVDRAxQqa7Sd45KICrLMWRoJmR7U8&callback=gmReady">
</script>
</body>
</html>
