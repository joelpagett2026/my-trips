<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="/icons/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noindex, nofollow">
<title>Joel Pagett</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Montserrat', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; display: flex; flex-direction: column; }
  .hero { padding: 56px 24px 40px; text-align: center; }
  .hero-avatar { width: 64px; height: 64px; background: linear-gradient(135deg, #0e7a87, #0fbdcf); border-radius: 18px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 20px; box-shadow: 0 0 0 1px rgba(15,189,207,0.2), 0 8px 32px rgba(14,122,135,0.35); }
  .hero-title { font-size: 28px; font-weight: 800; color: #ffffff; letter-spacing: -0.02em; margin-bottom: 6px; }
  .hero-sub { font-size: 13px; color: #7d8590; font-weight: 500; }
  .tools-section { padding: 8px 16px 40px; flex: 1; max-width: 600px; margin: 0 auto; width: 100%; }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #3d444d; margin-bottom: 12px; padding-left: 4px; }
  .tool-card { display: flex; align-items: center; gap: 16px; background: #161b22; border: 1px solid #21262d; border-radius: 16px; padding: 18px 20px; text-decoration: none; color: inherit; margin-bottom: 10px; transition: border-color 0.15s, transform 0.1s; position: relative; overflow: hidden; }
  .tool-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(14,122,135,0.06) 0%, transparent 60%); opacity: 0; transition: opacity 0.2s; }
  .tool-card:hover { border-color: #0e7a87; transform: translateY(-1px); }
  .tool-card:hover::before { opacity: 1; }
  .tool-card:active { transform: translateY(0); }
  .tool-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .tool-icon.teal  { background: rgba(14,122,135,0.15); color: #0fbdcf; }
  .tool-icon.green { background: rgba(22,168,90,0.12);  color: #3fb950; }
  .tool-icon.amber { background: rgba(240,145,10,0.12); color: #f0910a; }
  .tool-body { flex: 1; min-width: 0; }
  .tool-name { font-size: 15px; font-weight: 700; color: #e6edf3; margin-bottom: 3px; letter-spacing: -0.01em; }
  .tool-desc { font-size: 12px; color: #7d8590; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tool-stat { text-align: right; flex-shrink: 0; }
  .stat-num { font-size: 22px; font-weight: 800; color: #0fbdcf; line-height: 1; letter-spacing: -0.02em; }
  .stat-num.green { color: #3fb950; }
  .stat-num.amber { color: #f0910a; }
  .stat-num.red   { color: #f85149; }
  .stat-label { font-size: 10px; color: #3d444d; font-weight: 600; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }
  .tool-arrow { color: #3d444d; flex-shrink: 0; margin-left: 4px; transition: color 0.15s, transform 0.15s; }
  .tool-card:hover .tool-arrow { color: #0e7a87; transform: translateX(2px); }
  .hub-footer { text-align: center; padding: 0 24px 32px; font-size: 11px; color: #3d444d; font-weight: 500; }
  .hub-footer span { display: inline-block; width: 3px; height: 3px; background: #3d444d; border-radius: 50%; vertical-align: middle; margin: 0 8px 2px; }
  .private-link { position: fixed; top: 20px; right: 20px; color: #3d444d; transition: color 0.15s; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; z-index: 10; }
  .private-link:hover { color: #0fbdcf; }
  /* Holiday pair */
  .hol-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .hol-person-card { background: #161b22; border: 1px solid #21262d; border-radius: 16px; padding: 16px; text-decoration: none; color: inherit; display: flex; flex-direction: column; gap: 14px; transition: border-color 0.15s, transform 0.1s; position: relative; overflow: hidden; }
  .hol-person-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(14,122,135,0.06) 0%, transparent 60%); opacity: 0; transition: opacity 0.2s; }
  .hol-person-card:hover { border-color: #0e7a87; transform: translateY(-1px); }
  .hol-person-card:hover::before { opacity: 1; }
  .hol-person-card:hover .tool-arrow { color: #0e7a87; }
  .hpc-top { display: flex; align-items: center; gap: 10px; }
  .hpc-name { font-size: 14px; font-weight: 700; color: #e6edf3; letter-spacing: -0.01em; }
  .hpc-period { font-size: 10px; color: #7d8590; font-weight: 500; margin-top: 2px; }
  .hpc-stats { display: flex; align-items: center; gap: 0; background: rgba(255,255,255,0.03); border-radius: 10px; padding: 10px 0; }
  .hpc-stat { flex: 1; text-align: center; }
  .hpc-val { font-size: 20px; font-weight: 800; color: #e6edf3; line-height: 1; letter-spacing: -0.02em; }
  .hpc-val.orange { color: #f0910a; }
  .hpc-val.green  { color: #3fb950; }
  .hpc-val.red    { color: #f85149; }
  .hpc-lbl { font-size: 9px; color: #3d444d; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 3px; }
  .hpc-divider { width: 1px; background: #21262d; align-self: stretch; }
</style>
</head>
<body>

<a class="private-link" href="/private/" title="Private" aria-label="Private area">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
</a>

<div class="hero">
  <div class="hero-avatar">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
    </svg>
  </div>
  <div class="hero-title">Joel Pagett</div>
  <div class="hero-sub">Personal tools &amp; trackers</div>
</div>

<div class="tools-section">
  <div class="section-label">My tools</div>

  <a class="tool-card" href="/trips/">
    <div class="tool-icon teal">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
    </div>
    <div class="tool-body">
      <div class="tool-name">Holiday Planner</div>
      <div class="tool-desc" id="trips-desc">Itineraries, maps &amp; more</div>
    </div>
    <div class="tool-stat">
      <div class="stat-num" id="trips-stat">—</div>
      <div class="stat-label">trips</div>
    </div>
    <svg class="tool-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </a>

  <div class="hol-pair">
    <a class="hol-person-card" href="/holidays/2026-27.html">
      <div class="hpc-top">
        <div class="tool-icon green" style="width:36px;height:36px;border-radius:10px;flex-shrink:0;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
        <div>
          <div class="hpc-name">Joel</div>
          <div class="hpc-period">2026/27 · Apr – Mar</div>
        </div>
        <svg class="tool-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-left:auto;flex-shrink:0;"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div class="hpc-stats">
        <div class="hpc-stat">
          <div class="hpc-val" id="joel-trips">6</div>
          <div class="hpc-lbl">trips</div>
        </div>
        <div class="hpc-divider"></div>
        <div class="hpc-stat">
          <div class="hpc-val orange" id="joel-used">23</div>
          <div class="hpc-lbl">days used</div>
        </div>
        <div class="hpc-divider"></div>
        <div class="hpc-stat">
          <div class="hpc-val green" id="joel-rem">5</div>
          <div class="hpc-lbl">remaining</div>
        </div>
      </div>
    </a>
    <a class="hol-person-card" href="/holidays/jonathan/2026.html">
      <div class="hpc-top">
        <div class="tool-icon green" style="width:36px;height:36px;border-radius:10px;flex-shrink:0;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
        <div>
          <div class="hpc-name">Jonathan</div>
          <div class="hpc-period">2026 · Jan – Dec</div>
        </div>
        <svg class="tool-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-left:auto;flex-shrink:0;"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div class="hpc-stats">
        <div class="hpc-stat">
          <div class="hpc-val" id="jon-trips">0</div>
          <div class="hpc-lbl">trips</div>
        </div>
        <div class="hpc-divider"></div>
        <div class="hpc-stat">
          <div class="hpc-val orange" id="jon-used">0</div>
          <div class="hpc-lbl">days used</div>
        </div>
        <div class="hpc-divider"></div>
        <div class="hpc-stat">
          <div class="hpc-val green" id="jon-rem">28</div>
          <div class="hpc-lbl">remaining</div>
        </div>
      </div>
    </a>
  </div>

  <a class="tool-card" href="/concerts/">
    <div class="tool-icon amber">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
      </svg>
    </div>
    <div class="tool-body">
      <div class="tool-name">Concert Log</div>
      <div class="tool-desc" id="concerts-desc">Log your live music</div>
    </div>
    <div class="tool-stat">
      <div class="stat-num amber" id="concerts-stat">—</div>
      <div class="stat-label">concerts</div>
    </div>
    <svg class="tool-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </a>
</div>

<div class="hub-footer">
  joelpagett.co.uk <span></span> Personal use only
</div>

<script src="/auth.js?v=2"></script>
<script src="/db.js?v=2"></script>
<script>
async function loadStats() {
  try {
    const registry = await window.dbLoad('registry');
    if (registry && registry.trips) {
      const trips = Object.values(registry.trips).filter(t => !t.deleted);
      document.getElementById('trips-stat').textContent = trips.length;
      const next = trips
        .filter(t => t.startDate && new Date(t.startDate) > new Date())
        .sort((a, b) => new Date(a.startDate) - new Date(b.startDate))[0];
      if (next) {
        const days = Math.ceil((new Date(next.startDate) - new Date()) / 86400000);
        document.getElementById('trips-desc').textContent = 'Next: ' + next.name + ' in ' + days + ' days';
      } else {
        document.getElementById('trips-desc').textContent = trips.length + ' trips planned & completed';
      }
    }
  } catch(e) {}

  try {
    const concerts = await window.dbLoad('concerts');
    if (concerts && concerts.list) {
      const count = concerts.list.length;
      document.getElementById('concerts-stat').textContent = count;
      const latest = concerts.list[concerts.list.length - 1];
      if (latest) document.getElementById('concerts-desc').textContent = 'Last: ' + latest.artist + ' at ' + latest.venue;
    } else {
      document.getElementById('concerts-stat').textContent = '0';
    }
  } catch(e) {}
}

loadStats();
</script>
</body>
</html>
