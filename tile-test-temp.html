<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tile Gap Test</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin: 0; font-family: sans-serif; background: #f0f0f0; padding: 20px; }
  h1 { font-size: 16px; }
  .row { display: flex; gap: 20px; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; gap: 6px; }
  .label { font-size: 12px; font-weight: 700; background: #222; color: #fff; padding: 6px 10px; border-radius: 4px; }
  .map { width: 320px; height: 360px; border: 1px solid #999; }
  #map-c { background: #ddd; }
  #map-b { background: #f7f6f2; }
  #map-d { background: #ddd; }
</style>
</head>
<body>
<h1>Tile gap test &mdash; compare A, B, C and tell me which looks cleanest (or if none do)</h1>
<div class="row">
  <div class="item">
    <div class="label">A - Control (current live behavior)</div>
    <div id="map-c" class="map"></div>
  </div>
  <div class="item">
    <div class="label">B - Background colour blended to tile tone</div>
    <div id="map-b" class="map"></div>
  </div>
  <div class="item">
    <div class="label">C - Tiles oversized 1px (prior attempt, for reference)</div>
    <div id="map-d" class="map"></div>
  </div>
</div>
<script>
const pins = [
  [41.1579,-8.6291],[41.1456,-8.6146],[41.1493,-8.6069],[41.1483,-8.6710],
  [41.1376,-8.6087],[41.1372,-8.6089],[41.1450,-8.6069],[41.1421,-8.6103],
  [41.1520,-8.6100],[41.1445,-8.6055]
];

function baseMap(id) {
  return L.map(id, { zoomControl: false, attributionControl: false });
}
function addPins(map) {
  const layer = L.layerGroup().addTo(map);
  pins.forEach(p => L.circleMarker(p, {radius:6,color:'#0e7a87',weight:2,fillColor:'#0e7a87',fillOpacity:0.6}).addTo(layer));
  map.fitBounds(pins, {padding:[24,24]});
}

const mapA = baseMap('map-c');
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd', maxZoom: 19, detectRetina: true
}).addTo(mapA);
addPins(mapA);

const mapB = baseMap('map-b');
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd', maxZoom: 19, detectRetina: true
}).addTo(mapB);
addPins(mapB);

const mapD = baseMap('map-d');
const tileLayerD = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd', maxZoom: 19, detectRetina: true
});
const origInitTile = tileLayerD._initTile;
tileLayerD._initTile = function(tile) {
  origInitTile.call(this, tile);
  const size = this.getTileSize();
  tile.style.width = (size.x + 1) + 'px';
  tile.style.height = (size.y + 1) + 'px';
};
tileLayerD.addTo(mapD);
addPins(mapD);

window._maps = {mapA, mapB, mapD};
</script>
</body>
</html>
