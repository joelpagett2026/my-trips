<style>
  /* ── DARK NAV ── */
  .nav { background: rgba(47,47,50,0.97); border-bottom: 1px solid rgba(255,255,255,0.08); }
  .nav .nav-title { color: #ffffff; }
  .nav .nav-back { color: #ffffff; }
  .nav .nav-back:hover { opacity: 0.85; }

  /* ── LAYOUT ── */
  .page-layout { display: grid; grid-template-columns: 1fr 320px; gap: 0; align-items: start; }
  .main-col { min-width: 0; }
  .dash-col {
    border-left: 0.5px solid rgba(0,0,0,0.1); background: #ffffff;
    position: sticky; top: 52px; height: calc(100vh - 52px);
    overflow-y: auto; align-self: start; scrollbar-width: none;
  }
  .dash-col::-webkit-scrollbar { display: none; }

  .section { padding: 0 20px 24px; }
  .section-title { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; color: #444444; margin-bottom: 10px; }
  .section-title .year { color: #0e7a87; }
  .year-divider { height: 1px; background: rgba(0,0,0,0.08); margin: 4px 20px 20px; }

  /* ── SHOW CARDS ── */
  .shows-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .s-card {
    background: #ffffff; border-radius: 18px; overflow: hidden;
    color: inherit; display: block; cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08), 0 0 0 0.5px rgba(0,0,0,0.05);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    position: relative;
  }
  .s-card-img { width: 100%; height: 240px; object-fit: cover; display: block; background: #f0f0f0; }
  .s-card-img.placeholder { display: flex; align-items: center; justify-content: center; color: #d5d5d5; }
  .s-card-body { padding: 12px 14px 14px; }
  .s-card:hover { transform: scale(1.015); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
  .s-card:active { transform: scale(0.985); }
  .s-card.upcoming { box-shadow: 0 0 0 2px #0e7a87, 0 2px 8px rgba(0,0,0,0.08); }
  .cd-pill {
    position: absolute; top: 8px; right: 8px; z-index: 5;
    font-size: 9px; font-weight: 700; padding: 3px 9px; border-radius: 20px;
    letter-spacing: 0.05em; text-transform: uppercase;
    background: rgba(14,122,135,0.9); color: #fff;
  }
  .s-card-name { font-size: 15px; font-weight: 700; color: #444444; line-height: 1.25; padding-right: 8px; }
  .s-card-theatre { font-size: 11px; color: #555555; font-weight: 500; margin-top: 5px; }
  .s-card-date { font-size: 11px; color: #888888; font-weight: 500; margin-top: 3px; display: flex; align-items: center; gap: 5px; }
  .s-card-date svg { color: #b8b8b8; flex-shrink: 0; }

  .empty-state {
    background: #fff; border: 2px dashed #ccc; border-radius: 16px;
    padding: 40px 24px; text-align: center; color: #999;
    font-size: 12px; font-weight: 600; margin: 0 20px;
  }

  /* ── DASHBOARD ── */
  .dash-inner { padding: 0 0 32px; }
  .dash-section { padding: 16px 16px 0; }
  .dash-section-title { font-size: 11px; font-weight: 700; color: #888888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }

  .dash-countdown {
    background: linear-gradient(135deg, #1a2a2a 0%, #0e3a3f 100%);
    border-radius: 14px; padding: 12px 16px; margin: 20px 16px 0;
    display: block; cursor: pointer;
  }
  .dash-countdown-label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
  .dash-countdown-name { font-size: 14px; font-weight: 700; color: #fff; }
  .dash-countdown-meta { font-size: 11px; color: rgba(255,255,255,0.6); font-weight: 500; margin-top: 2px; margin-bottom: 8px; }
  .dash-cd-block { background: rgba(255,255,255,0.12); border-radius: 8px; padding: 6px 10px; text-align: center; display: inline-block; min-width: 90px; }
  .dash-cd-num { font-size: 24px; font-weight: 700; color: #fff; line-height: 1; }
  .dash-cd-unit { font-size: 9px; color: rgba(255,255,255,0.45); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; margin-top: 2px; }

  .dash-latest {
    background: linear-gradient(135deg, #1a2a2a 0%, #0e3a3f 100%);

  .dash-stat { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: #e8e8e8; border-radius: 12px; margin-bottom: 8px; }
  .dash-stat:last-child { margin-bottom: 0; }

  .dash-stat-lbl { flex: 1; font-size: 10px; font-weight: 600; color: #888888; text-transform: uppercase; letter-spacing: 0.04em; }
  .dash-stat-val { font-size: 18px; font-weight: 700; color: #0e7a87; }

  .detail-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 180;

  .detail-overlay.open { display: flex; }
  .detail-card {

  .detail-body { padding: 18px 22px 20px; }

  .d-btn.delete:hover { color: #e53e3e; background: #fee; }

  /* ── ADD/EDIT MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200;
    display: none; align-items: flex-start; justify-content: center;
    padding: 24px 16px; overflow-y: auto;

  .modal {
    background: #fff; border-radius: 18px; padding: 22px;
    width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,0.25);

  .f-group { margin-bottom: 13px; }
  .f-label {
    font-size: 9px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; color: #999; margin-bottom: 5px; display: block;
  }
  .f-input {
    width: 100%; border: 1px solid #e0e0e0; border-radius: 9px;
    padding: 9px 11px; font-family: Montserrat, sans-serif;
    font-size: 13px; color: #444; outline: none; background: #fff;
    transition: border-color 0.15s;

  .f-input:focus { border-color: #0e7a87; }
  .f-input::placeholder { color: #b8b8b8; }
  .f-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .photo-drop {
    border: 2px dashed #d5d5d5; border-radius: 12px; padding: 18px;
    text-align: center; cursor: pointer; color: #999; font-size: 11px;
    font-weight: 600; transition: all 0.15s; position: relative; overflow: hidden;
  }
  .photo-drop:hover { border-color: #0e7a87; color: #0e7a87; background: #f4fafb; }
  .photo-drop img { width: 100%; border-radius: 8px; display: block; }
  .photo-drop .pd-remove {
    position: absolute; top: 8px; right: 8px; width: 26px; height: 26px;
    background: rgba(0,0,0,0.5); color: #fff; border: none; border-radius: 7px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }

  .suggest-box {
    position: absolute; left: 0; right: 0; top: 100%; margin-top: 4px;
    background: #fff; border: 1px solid #e0e0e0; border-radius: 9px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 60;
    display: none; overflow: hidden;
  }
  .suggest-item { padding: 8px 12px; font-size: 12.5px; font-weight: 600; color: #444; cursor: pointer; }
  .suggest-item:hover { background: #e6f9f7; color: #0e7a87; }

  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
  .m-btn {
    font-family: Montserrat, sans-serif; font-size: 13px; font-weight: 700;
    border-radius: 9px; padding: 9px 20px; cursor: pointer; border: none;
    transition: all 0.15s;
  }
  .m-btn.cancel { background: #f0f0f0; color: #666; }
  .m-btn.cancel:hover { background: #e2e2e2; }
  .m-btn.save { background: #0e7a87; color: #fff; }
  .m-btn.save:hover { background: #0a6570; }
  .m-btn.save:disabled { opacity: 0.5; cursor: default; }

  /* ── MOBILE ── */
  @media (max-width: 700px) {
    .page-layout { display: flex; flex-direction: column; }
    .main-col { width: 100%; }
    .dash-col { position: static; height: auto; border-left: none; border-top: 0.5px solid rgba(0,0,0,0.1); width: 100%; }
    .shows-grid { grid-template-columns: 1fr; gap: 12px; }
  }
</style>

<script>
let shows = [];
let editingId = null;
let modalPhoto = null;
let modalPhotoRemoved = false;

function parseDMY(s) {
  s = (s || '').trim();
  let m = s.match(/^(\d{1,2})\/(\d{4})$/);                 // mm/yyyy
  if (m) return new Date(+m[2], +m[1] - 1, 1);
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);          // legacy dd/mm/yyyy
  if (m) return new Date(+m[3], +m[2] - 1, 1);
  return null;
}
function yearOf(c) {
  const m = (c.date || '').match(/(\d{4})/);
  return m ? +m[1] : null;
}
function monthsUntil(c) {
  const d = parseDMY(c.date);
  if (!d) return null;
  const now = new Date();
  return (d.getFullYear() - now.getFullYear()) * 12 + (d.getMonth() - now.getMonth());
}
function daysUntil(c) { return monthsUntil(c); } // month-precision alias
function isUpcoming(c) {
  const n = monthsUntil(c);
  return n !== null && n > 0;
}
function fmtDate(s) {
  const d = parseDMY(s);
  return d ? d.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' }) : (s || '');
}
function fmtMonthShort(s) {
  const d = parseDMY(s);
  return d ? d.toLocaleDateString('en-GB', { month: 'short', year: 'numeric' }) : (s || '');
}
function upcomingLabel(c) {
  const n = monthsUntil(c);
  return n === 1 ? 'Next month' : 'In ' + n + ' months';
}
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}
function placeOf(c) {
  return [c.theatre, c.location].filter(Boolean).join(', ');
}

// ── IMAGE COMPRESSION ────────────────────────────────────────────────
function drawScaled(source, w, h, maxW, quality) {
  const scale = Math.min(1, maxW / w);
  const canvas = document.createElement('canvas');
  canvas.width = Math.round(w * scale);
  canvas.height = Math.round(h * scale);
  canvas.getContext('2d').drawImage(source, 0, 0, canvas.width, canvas.height);
  return canvas.toDataURL('image/jpeg', quality);
}

async function compress(file, maxW, quality) {
  if (window.createImageBitmap) {
    try {
      const bmp = await createImageBitmap(file);
      const out = drawScaled(bmp, bmp.width, bmp.height, maxW, quality);
      bmp.close();
      return out;
    } catch (e) { /* fall through */ }
  }
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      try { resolve(drawScaled(img, img.width, img.height, maxW, quality)); }
      catch (e) { reject(e); }
      URL.revokeObjectURL(img.src);
    };
    img.onerror = () => {
      URL.revokeObjectURL(img.src);
      reject(new Error('unsupported image format'));
    };
    img.src = URL.createObjectURL(file);
  });
}

function setPhotoPreview(src) {
  const drop = document.getElementById('photo-drop');
  if (src) {
    drop.innerHTML = '<img src="' + src + '"><button class="pd-remove" onclick="removePhoto(event)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';
  } else {
    drop.innerHTML = '<span id="pd-hint">Tap to choose a photo</span>';
  }
}

function removePhoto(e) {
  e.stopPropagation();
  modalPhoto = null;
  modalPhotoRemoved = true;
  document.getElementById('f-photo').value = '';
  setPhotoPreview(null);
}

document.getElementById('f-photo').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  const drop = document.getElementById('photo-drop');
  drop.innerHTML = '<span>Processing photo…</span>';
  try {
    const full  = await compress(file, 1000, 0.72);
    const thumb = await compress(file, 640, 0.7);
    modalPhoto = { full, thumb };
    modalPhotoRemoved = false;
    setPhotoPreview(full);
  } catch (err) {
    setPhotoPreview(modalPhoto ? modalPhoto.full : null);
    alert("Couldn't read that photo (" + (err.message || err) + "). If it's a HEIC image, try converting it to JPEG or picking a different photo.");
  }
  e.target.value = '';
});

// ── RENDER ───────────────────────────────────────────────────────────
function showCard(c, upcoming) {
  const a = document.createElement('div');
  a.className = 's-card' + (upcoming ? ' upcoming' : '');
  a.onclick = () => openDetail(c.id);
  let html = '';
  if (upcoming) {
    html += '<div class="cd-pill">' + upcomingLabel(c) + '</div>';
  }
  if (c.thumb) html += '<img class="s-card-img" src="' + c.thumb + '" alt="">';
  else html += '<div class="s-card-img placeholder"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 16.1A5 5 0 0 1 5.9 20M2 12.05A9 9 0 0 1 9.95 20M2 8V6a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-6"/><line x1="2" y1="20" x2="2.01" y2="20"/></svg></div>';
  html += '<div class="s-card-body">';
  html += '<div class="s-card-name">' + esc(c.name) + '</div>';
  html += '<div class="s-card-theatre">' + esc(placeOf(c)) + '</div>';
  const dateStr = fmtMonthShort(c.date);
  html += '<div class="s-card-date"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>' + dateStr + '</div>';
  html += '</div>';
  a.innerHTML = html;
  return a;
}

function renderAll() {
  const upcoming = shows.filter(isUpcoming).sort((a, b) => parseDMY(a.date) - parseDMY(b.date));
  const seen = shows.filter(c => !isUpcoming(c));

  const sections = document.getElementById('year-sections');
  sections.innerHTML = '';

  if (upcoming.length) {
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.innerHTML = '<div class="section-title"><span class="year">Upcoming</span></div>';
    const grid = document.createElement('div');
    grid.className = 'shows-grid';
    upcoming.forEach(c => grid.appendChild(showCard(c, true)));
    sec.appendChild(grid);
    sections.appendChild(sec);
    const div = document.createElement('div');
    div.className = 'year-divider';
    sections.appendChild(div);
  }

  const byYear = {};
  seen.forEach(c => {
    const y = yearOf(c);
    if (y) (byYear[y] = byYear[y] || []).push(c);
  });
  const years = Object.keys(byYear).map(Number).sort((a, b) => b - a);

  if (!years.length && !upcoming.length) {
    sections.innerHTML = '<div class="empty-state">No shows logged yet — tap + Show to add your first</div>';
  }

  years.forEach((y, i) => {
    if (i > 0) {
      const div = document.createElement('div');
      div.className = 'year-divider';
      sections.appendChild(div);
    }
    const sec = document.createElement('div');
    sec.className = 'section';
    const title = document.createElement('div');
    title.className = 'section-title';
    title.innerHTML = '<span class="year">' + y + '</span> Shows';
    sec.appendChild(title);
    const grid = document.createElement('div');
    grid.className = 'shows-grid';
    byYear[y]
      .sort((a, b) => (parseDMY(b.date) || 0) - (parseDMY(a.date) || 0))
      .forEach(c => grid.appendChild(showCard(c, false)));
    sec.appendChild(grid);
    sections.appendChild(sec);
  });

  // ── Stats ──
  document.getElementById('s-shows').textContent = seen.length;
  document.getElementById('s-theatres').textContent =
    new Set(seen.map(c => (c.theatre || '').trim().toLowerCase()).filter(Boolean)).size;
  const thisYear = new Date().getFullYear();
  document.getElementById('s-year').textContent =
    seen.filter(c => yearOf(c) === thisYear).length;

  // ── Next show countdown ──
  const next = upcoming[0];
  const cd = document.getElementById('dash-countdown');
  if (next) {
    cd.style.display = 'block';
    cd.onclick = () => openDetail(next.id);
    document.getElementById('cd-name').textContent = next.name;
    document.getElementById('cd-meta').textContent =
      [placeOf(next), fmtMonthShort(next.date)].filter(Boolean).join(' · ');
    const n = monthsUntil(next);
    document.getElementById('cd-days').textContent = n;
    document.querySelector('#dash-countdown .dash-cd-unit').textContent = n === 1 ? 'month to go' : 'months to go';
  } else cd.style.display = 'none';

  // ── Latest show ──
  const dated = seen.filter(c => parseDMY(c.date)).sort((a, b) => parseDMY(b.date) - parseDMY(a.date));
  const latest = dated[0];
  const lt = document.getElementById('dash-latest');
  if (latest) {
    lt.style.display = 'block';
    lt.onclick = () => openDetail(latest.id);
    document.getElementById('lt-name').textContent = latest.name;
    document.getElementById('lt-meta').textContent =
      [placeOf(latest), fmtMonthShort(latest.date)].filter(Boolean).join(' · ');
    const img = document.getElementById('lt-img');
    if (latest.thumb) {
      img.src = latest.thumb;
      img.style.display = 'block';
      if (latest.hasPhoto) {
        dbLoad('show-photo-' + latest.id)
          .then(rec => { if (rec && rec.photo) img.src = rec.photo; })
          .catch(() => {});
      }
    } else img.style.display = 'none';
  } else lt.style.display = 'none';
}

// ── DETAIL LIGHTBOX ──────────────────────────────────────────────────
function openDetail(id) {
  const c = shows.find(x => x.id === id);
  if (!c) return;
  const upcoming = isUpcoming(c);
  const du = daysUntil(c);
  const card = document.getElementById('detail-card');

  let html = '<button class="detail-close' + (c.hasPhoto ? '' : ' no-photo') + '" onclick="closeDetail()">'
    + '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';

  if (c.hasPhoto) {
    html += '<img class="detail-photo" id="detail-photo"' + (c.thumb ? ' src="' + c.thumb + '"' : '') + ' alt="">';
  }
  html += '<div class="detail-body">';
  html += '<div class="detail-name">' + esc(c.name) + '</div>';
  html += '<div class="detail-pill-row"><span class="show-pill">Stage Show</span>'
    + (upcoming ? '<span class="show-pill upcoming">' + upcomingLabel(c) + '</span>' : '')
    + '</div>';

  html += '<div class="detail-meta">';
  html += '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>' + esc(placeOf(c));
  html += '<span style="color:#d5d5d5;">·</span>';
  html += '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>' + fmtDate(c.date);
  html += '</div>';

  html += '<div class="detail-actions">';
  html += '<button class="d-btn edit" onclick="editFromDetail(\'' + c.id + '\')">'
    + '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.83 2.83 0 0 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>Edit</button>';
  html += '<button class="d-btn delete" onclick="deleteShow(\'' + c.id + '\')" title="Delete">'
    + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>';
  html += '</div></div>';

  card.innerHTML = html;
  document.getElementById('detail-overlay').classList.add('open');

  if (c.hasPhoto) {
    dbLoad('show-photo-' + c.id)
      .then(rec => {
        if (rec && rec.photo) {
          const img = document.getElementById('detail-photo');
          if (img) img.src = rec.photo;
        }
      }).catch(() => {});
  }
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
}
document.getElementById('detail-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeDetail();
});

function editFromDetail(id) {
  closeDetail();
  openModal(id);
}

// ── MODAL ────────────────────────────────────────────────────────────
async function openModal(id) {
  editingId = id || null;
  modalPhoto = null;
  modalPhotoRemoved = false;
  const c = id ? shows.find(x => x.id === id) : null;
  document.getElementById('modal-title').textContent = c ? 'Edit show' : 'Add show';
  document.getElementById('f-name').value     = c ? c.name : '';
  document.getElementById('f-date').value     = c ? c.date : '';
  document.getElementById('f-theatre').value  = c ? (c.theatre || '') : '';
  document.getElementById('f-location').value = c ? (c.location || '') : '';
  setPhotoPreview(c && c.hasPhoto ? (c.thumb || null) : null);
  document.getElementById('overlay').classList.add('open');
  if (!c) document.getElementById('f-name').focus();

  if (c && c.hasPhoto) {
    try {
      const rec = await dbLoad('show-photo-' + c.id);
      if (rec && rec.photo && !modalPhoto && !modalPhotoRemoved) setPhotoPreview(rec.photo);
    } catch (e) {}
  }
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}

// Clicking outside the edit modal intentionally does NOT close it.

// ── AUTOCOMPLETE (theatres & locations) ──────────────────────────────
function knownValues(field) {
  return () => {
    const seen = new Map();
    shows.forEach(c => {
      const k = ((c[field] || '')).trim();
      if (k && !seen.has(k.toLowerCase())) seen.set(k.toLowerCase(), k);
    });
    return [...seen.values()].sort((a, b) => a.localeCompare(b));
  };
}

function attachSuggest(el, source) {
  const box = document.createElement('div');
  box.className = 'suggest-box';
  el.parentElement.style.position = 'relative';
  el.parentElement.appendChild(box);

  function update() {
    const q = el.value.trim().toLowerCase();
    if (!q) { box.style.display = 'none'; return; }
    const matches = source().filter(a => {
      const l = a.toLowerCase();
      return l.includes(q) && l !== q;
    }).slice(0, 6);
    if (!matches.length) { box.style.display = 'none'; return; }
    box.innerHTML = '';
    matches.forEach(m => {
      const d = document.createElement('div');
      d.className = 'suggest-item';
      d.textContent = m;
      d.addEventListener('mousedown', ev => {
        ev.preventDefault();
        el.value = m;
        box.style.display = 'none';
        el.focus();
      });
      box.appendChild(d);
    });
    box.style.display = 'block';
  }

  el.addEventListener('input', update);
  el.addEventListener('blur', () => setTimeout(() => { box.style.display = 'none'; }, 150));
}

attachSuggest(document.getElementById('f-theatre'),  knownValues('theatre'));
attachSuggest(document.getElementById('f-location'), knownValues('location'));

// ── SAVE / DELETE ────────────────────────────────────────────────────
async function loadFresh() {
  try {
    const rec = await dbLoad('shows');
    shows = (rec && Array.isArray(rec.list)) ? rec.list : [];
  } catch (e) { shows = []; }
}

async function saveShow() {
  const name = document.getElementById('f-name').value.trim();
  const date = document.getElementById('f-date').value.trim();
  if (!name || !date) { alert('Show name and date are required'); return; }
  if (!parseDMY(date)) { alert('Date must be mm/yyyy'); return; }

  const btn = document.getElementById('save-btn');
  btn.disabled = true;

  await loadFresh(); // always load fresh before saving

  const id = editingId || ('s' + Date.now());
  const existing = shows.find(x => x.id === id);
  const entry = {
    id,
    name,
    date,
    theatre:  document.getElementById('f-theatre').value.trim(),
    location: document.getElementById('f-location').value.trim(),
    thumb:    existing ? existing.thumb : null,
    hasPhoto: existing ? !!existing.hasPhoto : false,
  };

  if (modalPhoto) {
    entry.thumb = modalPhoto.thumb;
    entry.hasPhoto = true;
  } else if (modalPhotoRemoved) {
    entry.thumb = null;
    entry.hasPhoto = false;
  }

  const idx = shows.findIndex(x => x.id === id);
  if (idx >= 0) shows[idx] = entry; else shows.push(entry);

  try {
    if (modalPhoto) await dbSave('show-photo-' + id, { photo: modalPhoto.full });
    else if (modalPhotoRemoved) { try { await dbDelete('show-photo-' + id); } catch (e) {} }
    await dbSave('shows', { list: shows });
  } catch (e) {
    alert('Save failed: ' + e.message);
    btn.disabled = false;
    return;
  }

  btn.disabled = false;
  closeModal();
  renderAll();
}

async function deleteShow(id) {
  const c = shows.find(x => x.id === id);
  if (!confirm('Delete ' + (c ? c.name : 'this show') + '?')) return;
  closeDetail();
  await loadFresh();
  shows = shows.filter(x => x.id !== id);
  try {
    await dbSave('shows', { list: shows });
    try { await dbDelete('show-photo-' + id); } catch (e) {}
  } catch (e) { alert('Delete failed: ' + e.message); return; }
  renderAll();
}

// ── INIT ─────────────────────────────────────────────────────────────
(async () => {
  await loadFresh();
  renderAll();
})();
</script>
