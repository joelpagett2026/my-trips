<script>
const ALLOWANCE = 28;
const CAL_YEAR  = '2026';

// ── Parse dd/mm/yyyy → year string ───────────────────────────────────
function startYear(dateStr) {
  const p = (dateStr || '').split('/');
  return p.length === 3 ? p[2] : null;
}

// ── Extract trips from a fetched HTML string ──────────────────────────
function parseTripsFromHTML(html) {
  const m = html.match(/const trips = (\[.*?\]);/s);
  if (!m) return [];
  try { return JSON.parse(m[1]); } catch(e) { return []; }
}

// ── Build a read-only trip card ───────────────────────────────────────
function makeCard(trip, sourceLabel) {
  const card = document.createElement('div');
  card.className = 'trip-card';

  // source label above card
  const lbl = document.createElement('div');
  lbl.className = 'joel-source-label';
  lbl.textContent = '↳ ' + sourceLabel;

  function readCell(label, value, cls) {
    const d = document.createElement('div');
    d.className = 'cell' + (cls ? ' ' + cls : '');
    const l = document.createElement('div');
    l.className = 'cell-label';
    l.textContent = label;
    const v = document.createElement('div');
    v.style.cssText = cls && cls.includes('num') ?
      'font-size:18px;font-weight:700;text-align:center;color:' + (cls.includes('hol') ? '#ff9500' : '#0e7a87') :
      'font-size:' + (label === 'Destination' ? '14px;font-weight:700;color:#0e7a87' : '13px;color:#444');
    v.textContent = value || '—';
    d.appendChild(l);
    d.appendChild(v);
    return d;
  }

  const header = document.createElement('div');
  header.className = 'card-header';
  header.style.gridTemplateColumns = '200px 1fr 1fr 1fr';
  header.appendChild(readCell('Destination', trip.dest));
  header.appendChild(readCell('Start date',  trip.start));
  header.appendChild(readCell('End date',    trip.end));
  header.appendChild(readCell('Return date', trip.ret));

  const footer = document.createElement('div');
  footer.className = 'card-footer';
  footer.appendChild(readCell('Days off',     trip.days, 'num-cell'));
  footer.appendChild(readCell('Lieu time',    trip.lieu, 'num-cell'));
  footer.appendChild(readCell('Holiday days', trip.hol,  'num-cell hol'));
  footer.appendChild(readCell('Notes',        trip.notes));

  card.appendChild(header);
  card.appendChild(footer);

  const wrapper = document.createElement('div');
  wrapper.appendChild(lbl);
  wrapper.appendChild(card);
  return wrapper;
}

// ── Recalculate summary stats from rendered cards ─────────────────────
function recalc(trips) {
  let days = 0, lieu = 0, hol = 0;
  trips.forEach(t => {
    days += parseInt(t.days) || 0;
    lieu += parseInt(t.lieu) || 0;
    hol  += parseInt(t.hol)  || 0;
  });
  const remaining = ALLOWANCE - hol;

  document.getElementById('tot-days').textContent = days;
  document.getElementById('tot-lieu').textContent = lieu;
  document.getElementById('tot-hol').textContent  = hol;
  document.getElementById('tot-remain').textContent = remaining;

  const remainEl   = document.getElementById('tot-remain');
  const remainStat = document.getElementById('remain-stat');
  const remainSub  = document.getElementById('remain-sub');

  if (remaining < 0) {
    remainEl.className = 'stat-val red'; remainStat.classList.add('danger');
    remainSub.textContent = Math.abs(remaining) + ' day' + (Math.abs(remaining) !== 1 ? 's' : '') + ' over allowance';
  } else if (remaining <= 3) {
    remainEl.className = 'stat-val orange'; remainStat.classList.remove('danger');
    remainSub.textContent = remaining === 0 ? 'Allowance fully used' : remaining + ' day' + (remaining !== 1 ? 's' : '') + ' left';
  } else {
    remainEl.className = 'stat-val green'; remainStat.classList.remove('danger');
    remainSub.textContent = remaining + ' of ' + ALLOWANCE + ' days remaining';
  }
}

// ── Main: fetch all Joel pages and filter by CAL_YEAR ─────────────────
async function loadFromJoel() {
  const sources = [
    { url: '/holidays/2025-26.html', label: "Joel's 2025/26 allowance" },
    { url: '/holidays/2026-27.html', label: "Joel's 2026/27 allowance" },
    { url: '/holidays/2027-28.html', label: "Joel's 2027/28 allowance" },
  ];

  const container = document.getElementById('cards');
  const loading   = document.getElementById('loading');

  let allTrips = [];

  await Promise.all(sources.map(async src => {
    try {
      const res  = await fetch(src.url);
      const html = await res.text();
      const trips = parseTripsFromHTML(html);
      trips.forEach(t => {
        if (startYear(t.start) === CAL_YEAR) {
          allTrips.push({ ...t, _source: src.label });
        }
      });
    } catch(e) { /* silently skip */ }
  }));

  // Sort by start date
  allTrips.sort((a, b) => {
    const parse = s => { const p = s.split('/'); return new Date(p[2], p[1]-1, p[0]); };
    return parse(a.start) - parse(b.start);
  });

  loading.remove();

  if (allTrips.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'loading-msg';
    empty.textContent = 'No trips found in ' + CAL_YEAR + ' — add trips to Joel\'s allowance pages.';
    container.appendChild(empty);
  } else {
    allTrips.forEach(t => {
      container.appendChild(makeCard(t, t._source));
    });
  }

  recalc(allTrips);
}

loadFromJoel();
</script>
