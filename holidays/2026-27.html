    ADD TRIP
  </button>

<script>
const ALLOWANCE = 28;
const trips = [
  {
    "dest": "China",
    "start": "31/03/2026",
    "end": "15/04/2026",
    "ret": "17/04/2026",
    "days": 5,
    "lieu": 2,
    "hol": 10,
    "notes": "One Lieu from March 6th, One from additional hours. Working 25/04"
  },
  {
    "dest": "Porto",
    "start": "29/08/2026",
    "end": "06/09/2026",
    "ret": "07/09/2026",
    "days": 4,
    "lieu": 1,
    "hol": 4,
    "notes": "One Lieu from additional hours"
  },
  {
    "dest": "Hamburg",
    "start": "18/09/2026",
    "end": "20/09/2026",
    "ret": "21/09/2026",
    "days": 2,
    "lieu": 0,
    "hol": 2,
    "notes": ""
  },
  {
    "dest": "Gothenburg",
    "start": "09/10/2026",
    "end": "11/10/2026",
    "ret": "12/10/2026",
    "days": 2,
    "lieu": 1,
    "hol": 0,
    "notes": "One Lieu from additional hours"
  },
  {
    "dest": "Cyprus",
    "start": "23/12/2026",
    "end": "30/12/2026",
    "ret": "31/12/2026",
    "days": 2,
    "lieu": 1,
    "hol": 4,
    "notes": "One Lieu from additional hours."
  },
  {
    "dest": "Hong Kong & Taiwan",
    "start": "27/03/2027",
    "end": "11/04/2027",
    "ret": "12/04/2027",
    "days": 0,
    "lieu": 0,
    "hol": 3,
    "notes": "3 Holiday Days from 2025/26 Allowance - Remainder 2027"
  }
];

function inp(val, cls, placeholder) {
  const i = document.createElement('input');
  i.type = 'text';
  i.value = val !== undefined ? val : '';
  if (placeholder) i.placeholder = placeholder;
  if (cls) i.className = cls;
  i.addEventListener('input', recalc);
  return i;
}

function cell(label, content, cls) {
  const d = document.createElement('div');
  d.className = 'cell' + (cls ? ' ' + cls : '');
  const l = document.createElement('div');
  l.className = 'cell-label';
  l.textContent = label;
  d.appendChild(l);
  d.appendChild(content);
  return d;
}

function addTrip(data) {
  const d = data || { dest: '', start: '', end: '', ret: '', days: '', lieu: '', hol: '', notes: '' };
  const card = document.createElement('div');
  card.className = 'trip-card';

  const header = document.createElement('div');
  header.className = 'card-header';
  header.appendChild(cell('Destination', inp(d.dest, 'dest-input', 'e.g. Paris')));
  header.appendChild(cell('Start date',  inp(d.start, '', 'dd/mm/yyyy')));
  header.appendChild(cell('End date',    inp(d.end,   '', 'dd/mm/yyyy')));
  header.appendChild(cell('Return date', inp(d.ret,   '', 'dd/mm/yyyy')));

  const delCell = document.createElement('div');
  delCell.className = 'cell del-cell';
  const delBtn = document.createElement('button');
  delBtn.className = 'del-btn';
  delBtn.title = 'Remove trip';
  delBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
  delBtn.addEventListener('click', () => { card.remove(); recalc(); });
  delCell.appendChild(delBtn);
  header.appendChild(delCell);

  const footer = document.createElement('div');
  footer.className = 'card-footer';
  footer.appendChild(cell('Days off',     inp(d.days, 'num-input',           '0'), 'num-cell'));
  footer.appendChild(cell('Lieu time',    inp(d.lieu, 'num-input',           '0'), 'num-cell'));
  footer.appendChild(cell('Holiday days', inp(d.hol,  'num-input hol-input', '0'), 'num-cell'));
  footer.appendChild(cell('Notes',        inp(d.notes, '', 'Add a note…')));

  card.appendChild(header);
  card.appendChild(footer);

  const container = document.getElementById('cards');
  container.insertBefore(card, container.querySelector('.add-card'));
  recalc();
  if (!data) card.querySelector('input').focus();
}

function recalc() {
  let days = 0, lieu = 0, hol = 0;
  document.querySelectorAll('.trip-card').forEach(card => {
    const nums = card.querySelectorAll('.num-input');
    days += parseInt(nums[0]?.value) || 0;
    lieu += parseInt(nums[1]?.value) || 0;
    hol  += parseInt(nums[2]?.value) || 0;
  });
  const remaining = ALLOWANCE - hol;
  document.getElementById('tot-days').textContent = days;
  document.getElementById('tot-lieu').textContent = lieu;
  document.getElementById('tot-hol').textContent  = hol;
  document.getElementById('tot-remain').textContent = remaining;

  const remainEl   = document.getElementById('tot-remain');
  const remainStat = document.getElementById('remain-stat');
  const remainSub  = document.getElementById('remain-sub');

  if (remaining < 0) {
    remainEl.className = 'stat-val red';
    remainStat.classList.add('danger');
    remainSub.textContent = Math.abs(remaining) + ' day' + (Math.abs(remaining) !== 1 ? 's' : '') + ' over allowance';
  } else if (remaining <= 3) {
    remainEl.className = 'stat-val orange';
    remainStat.classList.remove('danger');
    remainSub.textContent = remaining === 0 ? 'Allowance fully used' : remaining + ' day' + (remaining !== 1 ? 's' : '') + ' left';
  } else {
    remainEl.className = 'stat-val green';
    remainStat.classList.remove('danger');
    remainSub.textContent = remaining + ' of ' + ALLOWANCE + ' days remaining';
  }
}

trips.forEach(addTrip);
</script>
